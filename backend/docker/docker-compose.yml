version: "3.9"

services:

  # =========================
  # FASTAPI APP
  # =========================
  api:

    build:
      context: ..
      dockerfile: Dockerfile

    container_name: sentinelscan_api

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000

    ports:
      - "8000:8000"

    env_file:
      - ../.env

    depends_on:
      - redis
      - db

    volumes:
      - ../:/app

    restart: always


  # =========================
  # CELERY WORKER
  # =========================
  worker:

    build:
      context: ..
      dockerfile: Dockerfile

    container_name: sentinelscan_worker

    command: >
      celery
      -A workers.celery_worker
      worker
      --loglevel=info
      -Q scan_queue

    env_file:
      - ../.env

    depends_on:
      - redis
      - db

    volumes:
      - ../:/app

    restart: always


  # =========================
  # REDIS
  # =========================
  redis:

    image: redis:7-alpine

    container_name: sentinelscan_redis

    ports:
      - "6379:6379"

    restart: always


  # =========================
  # POSTGRES
  # =========================
  db:

    image: postgres:15-alpine

    container_name: sentinelscan_postgres

    environment:

      POSTGRES_DB: sentinelscan

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always


# =========================
# VOLUMES
# =========================

volumes:

  postgres_data: